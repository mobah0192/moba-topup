{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Web Topup{% endblock %}</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        
        /* Video Background */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        .video-background video {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }
        
        /* Overlay untuk gelapkan video */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6); /* Sesuaikan kegelapan */
            z-index: -1;
        }
        
        /* Container utama */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        /* Card login/register */
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            animation: fadeIn 0.8s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Header card */
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-header h2 {
            color: #333;
            font-weight: 700;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .auth-header p {
            color: #666;
            font-size: 14px;
        }
        
        /* Form controls */
        .form-control {
            border: 2px solid #e1e1e1;
            border-radius: 12px;
            padding: 12px 15px;
            font-size: 14px;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.9);
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            outline: none;
        }
        
        .form-label {
            font-weight: 500;
            color: #555;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        /* Button */
        .btn-auth {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            padding: 14px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        /* Social login */
        .social-login {
            margin-top: 25px;
            text-align: center;
        }
        
        .social-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: white;
            border: 2px solid #e1e1e1;
            margin: 0 5px;
            transition: all 0.3s;
            color: #333;
            text-decoration: none;
        }
        
        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .social-btn.google:hover {
            background: #DB4437;
            color: white;
            border-color: #DB4437;
        }
        
        .social-btn.facebook:hover {
            background: #4267B2;
            color: white;
            border-color: #4267B2;
        }
        
        .social-btn.twitter:hover {
            background: #1DA1F2;
            color: white;
            border-color: #1DA1F2;
        }
        
        /* Link */
        .auth-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
        }
        
        .auth-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .auth-link a:hover {
            text-decoration: underline;
        }
        
        /* Password requirements */
        .password-requirements {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            font-size: 13px;
            list-style: none;
        }
        
        .password-requirements li {
            color: #666;
            margin-bottom: 5px;
        }
        
        .password-requirements li i {
            margin-right: 8px;
            font-size: 12px;
        }
        
        .password-requirements li.valid {
            color: #28a745;
        }
        
        .password-requirements li.invalid {
            color: #dc3545;
        }
        
        /* Music control */
        .music-control {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border-radius: 50px;
            padding: 10px 20px;
            color: white;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }
        
        .music-control:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }
        
        .music-control i {
            margin-right: 8px;
        }
        
        /* Volume slider */
        .volume-control {
            position: fixed;
            bottom: 90px;
            right: 30px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 10px;
            display: none;
            z-index: 999;
        }
        
        .volume-control.show {
            display: block;
        }
        
        .volume-slider {
            width: 100px;
            height: 5px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 5px;
            outline: none;
        }
        
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <!-- Video Background -->
    <div class="video-background">
        <video autoplay muted loop playsinline id="bgVideo">
            <source src="{% static 'videos/background-login.mp4' %}" type="video/mp4">
            Browser Anda tidak mendukung video tag.
        </video>
    </div>
    <div class="overlay"></div>
    
    <!-- Audio Background (disembunyikan) -->
    <audio id="bgMusic" loop preload="auto">
        <source src="{% static 'audio/background-music.mp3' %}" type="audio/mpeg">
    </audio>
    
    <!-- Music Control -->
    <div class="music-control" onclick="toggleMusic()">
        <i class="fas fa-music" id="musicIcon"></i>
        <span id="musicStatus">Putar Musik</span>
    </div>
    
    <!-- Volume Control -->
    <div class="volume-control" id="volumeControl">
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.1" value="0.5">
    </div>
    
    <!-- Content -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                {% block auth_header %}{% endblock %}
            </div>
            
            {% block content %}{% endblock %}
        </div>
    </div>
    
    <script>
        // Background Music
        const bgMusic = document.getElementById('bgMusic');
        const musicIcon = document.getElementById('musicIcon');
        const musicStatus = document.getElementById('musicStatus');
        const volumeControl = document.getElementById('volumeControl');
        const volumeSlider = document.getElementById('volumeSlider');
        
        // Set volume
        bgMusic.volume = volumeSlider.value;
        
        // Toggle music
        function toggleMusic() {
            if (bgMusic.paused) {
                bgMusic.play().catch(e => {
                    console.log("Autoplay prevented:", e);
                    alert("Klik izinkan untuk memutar musik");
                });
                musicIcon.className = 'fas fa-pause';
                musicStatus.textContent = 'Jeda Musik';
                volumeControl.classList.add('show');
            } else {
                bgMusic.pause();
                musicIcon.className = 'fas fa-music';
                musicStatus.textContent = 'Putar Musik';
            }
        }
        
        // Volume control
        volumeSlider.addEventListener('input', function() {
            bgMusic.volume = this.value;
        });
        
        // Show/hide volume control
        document.querySelector('.music-control').addEventListener('mouseenter', function() {
            if (!bgMusic.paused) {
                volumeControl.classList.add('show');
            }
        });
        
        document.querySelector('.music-control').addEventListener('mouseleave', function() {
            setTimeout(() => {
                if (!volumeControl.matches(':hover')) {
                    volumeControl.classList.remove('show');
                }
            }, 1000);
        });
        
        volumeControl.addEventListener('mouseleave', function() {
            this.classList.remove('show');
        });
        
        // Auto play attempt (may be blocked by browser)
        document.addEventListener('click', function initMusic() {
            bgMusic.play().catch(e => console.log("Still blocked:", e));
            document.removeEventListener('click', initMusic);
        }, { once: true });
        
        // Jika video autoplay tidak berjalan
        document.getElementById('bgVideo').play().catch(e => {
            console.log("Video autoplay prevented");
        });
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
